<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon YouTube to MP3</title>
    <link href="style.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <h1>Télécharger une musique YouTube en MP3</h1>
    
    <div class="convertir">
    <form action="/download" method="POST">
        <input type="url" name="youtubeUrl" placeholder="Colle le lien YouTube ici..." required>
        <button type="submit">Convertir en MP3</button>
    </form>
    </div>
    
<div class="revenir-mp3">
    <a href="index.html">Revenir au lecteur</a>
</div>    
</body>
</html>
